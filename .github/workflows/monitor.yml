name: Worker Health Check

on:
  schedule:
    - cron: "*/15 * * * *"  # Every 15 minutes
  workflow_dispatch:  # Manual trigger

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check Worker health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://foucauld-proxy.foucauld-finance.workers.dev/health)
          echo "Worker health status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Worker health check failed with status $STATUS"
            exit 1
          fi
          echo "Worker is healthy"

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🚨 Worker Health Check Failed';
            const body = `The Cloudflare Worker proxy health check failed at ${new Date().toISOString()}.\n\nCheck the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.\n\nWorker URL: https://foucauld-proxy.foucauld-finance.workers.dev/health`;

            // Check if an open issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'monitoring',
            });
            const existing = issues.data.find(i => i.title === title);
            if (existing) {
              // Add a comment to the existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Still failing at ${new Date().toISOString()}`,
              });
            } else {
              // Create a new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['monitoring', 'bug'],
              });
            }
