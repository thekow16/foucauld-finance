<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      // GitHub Pages SPA redirect: rewrites 404 paths to index.html with query param
      var seg = window.location.pathname.split('/').filter(Boolean);
      var repo = 'foucauld-finance';
      var path = seg.slice(seg.indexOf(repo) + 1).join('/');
      if (path) {
        window.location.replace(
          '/' + repo + '/?' + path +
          (window.location.search ? '&' + window.location.search.slice(1) : '') +
          window.location.hash
        );
      } else {
        window.location.replace('/' + repo + '/');
      }
    </script>
  </head>
</html>
